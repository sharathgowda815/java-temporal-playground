version: "3.5"

# docker-compose -f docker-compose.yaml up -d
services:
  mysql:
    container_name: temporal-mysql
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: temporal
      MYSQL_DATABASE: temporal
      MYSQL_USER: temporal
      MYSQL_PASSWORD: temporal
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - temporal-network
    ports:
      - 3308:3306
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-temporal.sql:/docker-entrypoint-initdb.d/init-temporal.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal:
    container_name: temporal
    image: temporalio/auto-setup:1.28.0
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB: mysql8
      MYSQL_USER: temporal
      MYSQL_PWD: temporal
      MYSQL_SEEDS: mysql
      DB_PORT: 3306
      # Removed DYNAMIC_CONFIG_FILE_PATH here
    ports:
      - 7233:7233
    # Removed volumes mounting dynamicconfig directory here
    networks:
      - temporal-network

  temporal-ui:
    container_name: temporal-ui
    image: temporalio/ui:2.15.0
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - 8123:8080
    networks:
      - temporal-network

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      # Auto-generate CLUSTER_ID
      KAFKA_CLUSTER_ID: "abcdefghijklmnopqrstuv"
    networks:
      - temporal-network

volumes:
  mysql-data:

networks:
  temporal-network:
    name: temporal-network
    driver: bridge
